<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Đăng ký thành viên</title>
</head>
<body>

<h1>Form Đăng ký thành viên</h1>

<form action="https://api-gateway.f8.edu.vn/action_page.php" method="post" enctype="multipart/form-data">

    <fieldset>
        <legend>Thông tin cơ bản</legend>

        <p>
            <label for="fullname">Họ và tên:</label><br>
            <input type="text" id="fullname" name="fullname" required, placeholder="Nguyễn Văn A", autofocus>
        </p>

        <p>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required, placeholder="example@gmail.com">
        </p>

        <p>
            <label for="password">Mật khẩu:</label><br>
            <input type="password" id="password" name="password" required, minlength="6", autocomplete="of">
        </p>

        <p>
            <label for="confirm_password">Nhập lại mật khẩu:</label><br>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </p>

        <p>
            <label for="phone">Số điện thoại:</label><br>
            <input type="tel" id="phone" name="phone" placeholder="Oxxxxxxxxx", pattern= "0[0-9](9}">
        </p>

        <p>
            <label for="birthday">Ngày sinh:</label><br>
            <input type="date" id="birthday" name="birthday" required>
        </p>

        <p>
            <label for="age">Tuổi:</label><br>
            <input type="number" id="age" name="age" min="1" max="120">
        </p>

        <p>
            <label for="website">Website cá nhân:</label><br>
            <input type="url" id="website" name="website" placeholder="https://...">
        </p>

        <p>
            <label for="address">Địa chỉ:</label><br>
            <input type="text" id="address" name="address" placeholder="Số nhà, đường, phường/xã">
        </p>

        <p>
            <label for="zipcode">Mã bưu chính:</label><br>
            <input type="text" id="zipcode" name="zipcode" maxlength="6" placeholder="700000">
        </p>
    </fieldset>

    <fieldset>
        <legend>Thông tin bổ sung</legend>

        <p>
            Giới tính:<br>
            <input type="radio" id="male" name="gender" value="Nam" required> <label for="male">Nam</label>
            <input type="radio" id="female" name="gender" value="Nữ"> <label for="female">Nữ</label>
            <input type="radio" id="other" name="gender" value="Khác"> <label for="other">Khác</label>
        </p>

        <p>
            Sở thích: <br>
            <input type="checkbox" id="hobby1" name="hobby" value="Đọc sách"> <label for="hobby1">Đọc sách</label>
            <input type="checkbox" id="hobby2" name="hobby" value="Nghe nhạc"> <label for="hobby2">Nghe nhạc</label>
            <input type="checkbox" id="hobby3" name="hobby" value="Du lịch"> <label for="hobby3">Du lịch</label>
            <input type="checkbox" id="hobby4" name="hobby" value="Lập trình"> <label for="hobby4">Lập trình</label>
            <input type="checkbox" id="hobby5" name="hobby" value="Nấu ăn"> <label for="hobby5">Nấu ăn</label>
            <input type="checkbox" id="hobby6" name="hobby" value="Thể thao"> <label for="hobby6">Thể thao</label>

        </p>

        <p>
            <label for="education">Trình độ học vấn:</label>
            <select id="education" name="education">
                <option value="Trung học">Trung học</option>
                <option value="Cao đẳng">Cao đẳng</option>
                <option value="Đại học">Đại học</option>
                <option value="Sau đại học">Sau đại học</option>
            </select>
        </p>

        <p>
            <label for="city">Tỉnh / Thành phố (Chọn ít nhất 5):</label><br>
            <select id="city" name="city" multiple size="5">
                <option value="Hà Nội">Hà Nội</option>
                <option value="TP. HCM">TP. HCM</option>
                <option value="Đà Nẵng">Đà Nẵng</option>
                <option value="Cần Thơ">Thanh </option>
                <option value="Hải Phòng">Hải Phòng</option>
            </select>
        </p>

        <p>
            <label for="job">Nghề nghiệp:</label>
            <select id="job" name="job">
                <option value="Học sinh">Học sinh</option>
                <option value="Sinh viên">Sinh viên</option>
                <option value="Nhân viên văn phòng">Nhân viên văn phòng</option>
                <option value="Lập trình viên">Lập trình viên</option>
                <option value="Khác">Khác</option>
            </select>
        </p>

        <p>
            Khoá học quan tâm: <br>
            <input type="checkbox" id="c1" name="course" value="HTML-CSS"> <label for="c1">HTML-CSS</label>
            <input type="checkbox" id="c2" name="course" value="JavaScript"> <label for="c2">JavaScript</label>
            <input type="checkbox" id="c3" name="course" value="ReactJS"> <label for="c3">ReactJS</label>
            <input type="checkbox" id="c4" name="course" value="NodeJS"> <label for="c4">NodeJS</label>
            <input type="checkbox" id="c5" name="Python" value="ReactJS"> <label for="c5">Python</label>

        </p>

        <p>
            Hình thức học:
            <input type="radio" id="online" name="study_type" value="Online"> <label for="online">Online</label>
            <input type="radio" id="offline" name="study_type" value="Offline"> <label for="offline">Offline</label>
        </p>

        <p>
            <label for="bio">Giới thiệu bản thân:</label><br>
            <textarea id="bio" name="bio" rows="4" placeholder="Viết vài dòng về bản thân..."></textarea>
        </p>

        <p>
            <label for="avatar">Ảnh đại diện:</label>
            <input type="file" id="avatar" name="avatar" accept=".jpg,.png">
        </p>

        <p>
            <label for="cv">CV / Hồ sơ:</label>
            <input type="file" id="cv" name="cv" accept=".pdf,.doc,.docx">
        </p>
    </fieldset>

    <fieldset>
        <legend>Input đặc biệt</legend>

        <p>
            <label for="fav_color">Màu yêu thích:</label>
            <input type="color" id="fav_color" name="fav_color" value="#ff6600">
        </p>

        <p>
            <label for="satisfaction">Mức độ hài lòng (0-10):</label>
            <input type="range" id="satisfaction" name="satisfaction" min="0" max="10" value="5">
        </p>

        <p>
            <label for="study_time">Giờ học trong ngày:</label>
            <input type="time" id="study_time" name="study_time">
        </p>

        <p>
            <label for="start_month">Tháng bắt đầu học:</label>
            <input type="month" id="start_month" name="start_month">
        </p>

        <p>
            <label for="start_week">Tuần bắt đầu học:</label>
            <input type="week" id="start_week" name="start_week">
        </p>

        <p>
            <label for="register_at">Ngày & giờ đăng ký:</label>
            <input type="datetime-local" id="register_at" name="register_at">
        </p>

        <p>
            <label for="search_course">Tìm kiếm khoá học:</label>
            <input type="search" id="search_course" name="search_course" placeholder="Nhập tên khoá học...">
        </p>

        <p>
            <label for="experience">Số năm kinh nghiệm:</label>
            <input type="number" id="experience" name="experience" min="0" max="50" step="1">
        </p>

        <p>
            <label for="budget">Mức học phí mong muốn:</label>
            <input type="range" id="budget" name="budget" min="0" max="5000000" step="100000" value="1000000">
        </p>

        <p>
            <label for="fav_lang">Ngôn ngữ lập trình yêu thích:</label>
            <input type="text" id="fav_lang" name="fav_lang" placeholder="VD: JavaScript, Python...">
        </p>
    </fieldset>

    <fieldset>
        <legend>Xác nhận & điều khoản</legend>

        <p>
            <input type="checkbox" id="agree_terms" name="agree_terms" required>
            <label for="agree_terms">Tôi đồng ý với điều khoản sử dụng</label>
        </p>

        <p>
            <input type="checkbox" id="subscribe" name="subscribe">
            <label for="subscribe">Nhận thông báo qua email</label>
        </p>

        <p>
            <input type="checkbox" id="sms_notify" name="sms_notify">
            <label for="sms_notify">Nhận thông báo qua SMS</label>
        </p>

        <p>
            <label for="ref_code">Mã giới thiệu:</label>
            <input type="text" id="ref_code" name="ref_code" placeholder="Nhập mã nếu có">
        </p>

        <input type="hidden" name="course_id" value="F8_2024">
        <input type="hidden" name="utm_source" value="website">
    </fieldset>

    <p>
        <button type="submit">Đăng ký ngay</button>
        <button type="reset">Nhập lại</button>
    </p>

</form>

</body>
</html>
