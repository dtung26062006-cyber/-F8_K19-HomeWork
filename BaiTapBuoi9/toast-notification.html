<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>

    <style>

        /* Ẩn checkbox */
        #toast-toggle{
            display:none;
        }

        /* Nút mở */
        .open-btn{
            display:inline-block;
            padding:10px;
            background:green;
            color:white;
            cursor:pointer;
        }

        /* Toast mặc định ẩn */
        .toast{
            display:none;
            background:lightgreen;
            padding:10px;
            margin-top:10px;
        }

        /* Khi checked thì hiện */
        #toast-toggle:checked ~ .toast{
            display:block;
        }

        /* Nút đóng */
        .close-btn{
            display:inline-block;
            background:green;
            color:white;
            padding:5px;
            margin-left:10px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<input type="checkbox" id="toast-toggle">

<label for="toast-toggle" class="open-btn">Hiện thông báo</label>

<div class="toast">✅ Lưu thành công!<label for="toast-toggle" class="close-btn">X</label>
</div>

</body>
</html>
